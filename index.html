<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Μάλτα: Dousis Guide</title>
    <style>
        /* CSS STYLES - Όπως ακριβώς το Βιέννη Guide */
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #fdf6e3; color: #2c3e50; margin: 0; padding-bottom: 60px; }
        
        .header { background: #fff; position: sticky; top: 0; z-index: 900; box-shadow: 0 4px 6px rgba(0,0,0,0.05); padding: 10px 0; border-bottom: 3px solid #d4af37; }
        h1 { text-align: center; color: #2c3e50; margin: 5px 0; font-size: 1.3rem; font-family: "Georgia", serif; }
        
        .filters-wrapper { display: flex; flex-direction: column; gap: 8px; margin-top: 5px; }
        .scroll-container { display: flex; overflow-x: auto; gap: 8px; padding: 0 15px; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
        .scroll-container::-webkit-scrollbar { display: none; }
        
        .btn-filter { flex: 0 0 auto; padding: 8px 15px; border-radius: 20px; border: 1px solid #d4af37; background: #fff; font-size: 0.85rem; color: #555; cursor: pointer; transition: 0.2s; white-space: nowrap; }
        .btn-filter.active { background: #d4af37; color: white; border-color: #d4af37; }
        .date-btn.active { background: #2c3e50; border-color: #2c3e50; }

        .container { max-width: 600px; margin: 0 auto; padding: 15px; }
        .card { background: white; border-radius: 4px; padding: 15px; margin-bottom: 15px; border-left: 5px solid #d4af37; box-shadow: 0 3px 6px rgba(0,0,0,0.1); }
        
        .category-tag { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; color: #d4af37; letter-spacing: 1px; }
        .name { font-size: 1.3rem; font-weight: 800; margin: 5px 0; color: #2c3e50; font-family: "Georgia", serif; }
        
        .distance-tag { font-size: 0.9rem; color: #555; display: block; margin-bottom: 5px; background: #eee; padding: 3px 8px; border-radius: 4px; width: fit-content; }
        
        .meta-info { display: flex; gap: 10px; margin-top: 8px; font-size: 0.9rem; }
        .time-badge { background: #2c3e50; color: white; padding: 2px 6px; border-radius: 4px; font-weight: bold; font-size: 0.8rem; }
        .cost-badge { background: #eafaf1; color: #27ae60; padding: 2px 6px; border-radius: 4px; font-weight: bold; font-size: 0.8rem; }
        
        .tip { background: #fcf3cf; color: #555; padding: 10px; border-radius: 4px; margin-top: 10px; font-style: italic; font-size: 0.95rem; border-left: 3px solid #f1c40f; }

        .card-actions { display: flex; gap: 10px; margin-top: 15px; }
        .action-btn { flex: 1; padding: 12px; border-radius: 4px; text-align: center; font-weight: bold; text-decoration: none; font-size: 0.9rem; cursor: pointer; border: none; text-transform: uppercase; letter-spacing: 0.5px; }
        .map-btn { background: white; color: #2c3e50; border: 1px solid #2c3e50; }
        .info-btn { background: #2c3e50; color: white; display: flex; align-items: center; justify-content: center; gap: 5px; }

        /* MODAL */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 2000; align-items: flex-end; justify-content: center; }
        .modal-content { background: white; width: 100%; max-width: 600px; border-radius: 15px 15px 0 0; padding: 25px; max-height: 85vh; overflow-y: auto; animation: slideUp 0.3s ease-out; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .modal-title { font-size: 1.4rem; font-weight: bold; color: #2c3e50; margin: 0; font-family: "Georgia", serif; }
        .close-btn { background: none; border: none; font-size: 2rem; color: #888; cursor: pointer; }
        .modal-body { font-size: 1.05rem; line-height: 1.6; color: #333; white-space: pre-line; }
        .audio-controls { margin-top: 20px; display: flex; gap: 10px; border-top: 1px solid #eee; padding-top: 15px; }
        .speak-btn { background: #d4af37; color: white; width: 100%; border-radius: 8px;}
        .stop-btn { background: #c0392b; color: white; display: none; width: 100%; border-radius: 8px;}
        
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="header">
        <h1>🇲🇹 Malta: Mediterranean Guide</h1>
        <div class="filters-wrapper">
            <div class="scroll-container">
                <button class="btn-filter date-btn active" onclick="filterData('day', 0)">Όλα</button>
                <button class="btn-filter date-btn" onclick="filterData('day', 1)">Δευ 11/5</button>
                <button class="btn-filter date-btn" onclick="filterData('day', 2)">Τρί 12/5</button>
                <button class="btn-filter date-btn" onclick="filterData('day', 3)">Τετ 13/5</button>
                <button class="btn-filter date-btn" onclick="filterData('day', 4)">Πέμ 14/5</button>
                <button class="btn-filter date-btn" onclick="filterData('day', 5)">Παρ 15/5</button>
                <button class="btn-filter date-btn" onclick="filterData('day', 6)">Σάβ 16/5</button>
                <button class="btn-filter date-btn" onclick="filterData('day', 7)">Κυρ 17/5</button>
            </div>
            <div class="scroll-container">
                <button class="btn-filter active" onclick="filterData('cat', 'all')">Όλα</button>
                <button class="btn-filter" onclick="filterData('cat', 'αξιοθέατα')">🏛️ Αξιοθέατα</button>
                <button class="btn-filter" onclick="filterData('cat', 'φαγητό')">🥪 Φαγητό</button>
                <button class="btn-filter" onclick="filterData('cat', 'ποτό')">🍸 Ποτό</button>
                <button class="btn-filter" onclick="filterData('cat', 'μεταφορές')">⛴️ Μεταφορές</button>
            </div>
        </div>
    </div>

    <div class="container" id="content"></div>

    <div id="infoModal" class="modal-overlay" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h2 id="modalTitle" class="modal-title"></h2>
                <button class="close-btn" onclick="closeModal()">×</button>
            </div>
            <div id="modalBody" class="modal-body"></div>
            <div class="audio-controls">
                <button id="speakBtn" class="action-btn speak-btn" onclick="startSpeaking()">🔊 Ακρόαση Ξεναγού</button>
                <button id="stopBtn" class="action-btn stop-btn" onclick="stopSpeaking()">⏹️ Stop</button>
            </div>
        </div>
    </div>

    <script>
        let allData = [];
        let currentDisplayData = [];
        let currentDay = 0;
        let currentCat = 'all';
        let currentTextToSpeak = "";
        const synth = window.speechSynthesis;

        fetch('locations.json')
            .then(res => res.json())
            .then(data => { allData = data; render(); })
            .catch(err => console.error("Error:", err));

        function filterData(type, value) {
            if (type === 'day') {
                currentDay = value;
                document.querySelectorAll('.date-btn').forEach(b => b.classList.remove('active'));
            } else {
                currentCat = value;
                document.querySelectorAll('.btn-filter:not(.date-btn)').forEach(b => b.classList.remove('active'));
            }
            event.target.classList.add('active');
            render();
        }

        function render() {
            const container = document.getElementById('content');
            container.innerHTML = '';

            currentDisplayData = allData.filter(item => {
                const dayMatch = currentDay === 0 || (item.days && item.days.includes(currentDay));
                let catMatch = true;
                if (currentCat !== 'all') catMatch = item.category.toLowerCase().includes(currentCat);
                return dayMatch && catMatch;
            });

            if (currentDisplayData.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding:20px; color:#777;">Κενό Πρόγραμμα (Πτήση/Ύπνος) 😴</div>';
                return;
            }

            currentDisplayData.forEach((item, index) => {
                const distanceHtml = item.distance ? `<span class="distance-tag">👣 Από Βάση/Προηγούμενο: <b>${item.distance}</b></span>` : '';

                const searchQuery = encodeURIComponent(item.name + " Malta");
                const realMapUrl = `https://www.google.com/maps/search/?api=1&query=${searchQuery}`;

                container.innerHTML += `
                    <div class="card">
                        <div class="category-tag">${item.category}</div>
                        <div class="name">${item.name}</div>
                        ${distanceHtml}
                        <div class="meta-info">
                            <span class="time-badge">🕒 ${item.time || '-'}</span>
                            <span class="cost-badge">💰 ${item.cost}</span>
                        </div>
                        <div class="tip">💡 ${item.tip}</div>
                        <div class="card-actions">
                            <button class="action-btn info-btn" onclick="openModal(${index})">ℹ️ Info & Audio</button>
                            <a href="${realMapUrl}" target="_blank" class="action-btn map-btn">📍 Χάρτης</a>
                        </div>
                    </div>
                `;
            });
        }

        function openModal(index) {
            const item = currentDisplayData[index];
            if (!item) return;
            document.getElementById('modalTitle').innerText = item.name;
            document.getElementById('modalBody').innerText = item.description || item.tip;
            
            // Αφαίρεση emoji για καθαρή ανάγνωση
            currentTextToSpeak = (item.description || item.tip).replace(/([\u2700-\u27BF]|[\uE000-\uF8FF]|\uD83C[\uDC00-\uDFFF]|\uD83D[\uDC00-\uDFFF]|[\u2011-\u26FF]|\uD83E[\uDD10-\uDDFF])/g, '');
            
            document.getElementById('infoModal').style.display = 'flex';
            stopSpeaking();
        }

        function closeModal() {
            document.getElementById('infoModal').style.display = 'none';
            stopSpeaking();
        }

        function startSpeaking() {
            if (synth.speaking) return;
            if (currentTextToSpeak) {
                const utterThis = new SpeechSynthesisUtterance(currentTextToSpeak);
                utterThis.lang = 'el-GR';
                utterThis.rate = 0.95;
                utterThis.onend = () => toggleAudioButtons(false);
                synth.speak(utterThis);
                toggleAudioButtons(true);
            }
        }

        function stopSpeaking() {
            if (synth.speaking) synth.cancel();
            toggleAudioButtons(false);
        }

        function toggleAudioButtons(isSpeaking) {
            document.getElementById('speakBtn').style.display = isSpeaking ? 'none' : 'inline-block';
            document.getElementById('stopBtn').style.display = isSpeaking ? 'inline-block' : 'none';
        }
    </script>

</body>
</html>
