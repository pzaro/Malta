        .time-badge { background: #2c3e50; color: white; padding: 2px 6px; border-radius: 4px; font-weight: bold; font-size: 0.8rem; }
        .cost-badge { background: #eafaf1; color: #27ae60; padding: 2px 6px; border-radius: 4px; font-weight: bold; font-size: 0.8rem; }

            "description": "📖 Πολιτιστική & Γαστρονομική Ανάλυση:\nΤο λιμάνι είναι γεμάτο Luzzu, παραδοσιακές ξύλινες βάρκες που έχουν ζωγραφισμένο το Μάτι του Όσιρι.\n\n🎙️ Tip Δούση:\n'Εδώ ήρθαμε για ψάρι! Το Tartarun είναι βραβευμένο, ίσως λίγο πιο premium στην τιμή, αλλά το ψάρι του σπαρταράει. Αν θέλετε κάτι πιο χαλαρό, καθίστε δίπλα στο La Nostra Padrona!'"

          {

            "tip": "Η κοσμοπολίτικη όψη της Μάλτας.",
            "cost": "€1.50",
            "description": "📖 Τοποθεσία:\nΤο καραβάκι από τη Βαλέτα για τη Sliema αποτελεί γρήγορη και φθηνή μεταφορά, καθώς το εισιτήριο κοστίζει €1.50.\n\n🎙️ Tip Δούση:\n'Περπατήστε τον τεράστιο πεζόδρομο έχοντας τη θάλασσα δίπλα σας. Κατεβείτε στα λαξευμένα βράχια. Τα Roman Baths είναι το ιδανικό σημείο για μια γρήγορη βουτιά σαν ντόπιοι!'"

            "description": "📖 Ιστορική Ανάλυση:\nΞεκίνησε ως μια 'τρύπα στον τοίχο' το 1922, όπου οι ντόπιοι έφερναν άδεια μπουκάλια για να τα γεμίσουν με κρασί.\n\n🎙️ Tip Δούση:\n'Για το τελευταίο σας βράδυ, αφήστε τα κυριλέ. Εδώ είναι το στέκι της καρδιάς μας. Ατμόσφαιρα indie, ψαγμένες craft μπύρες και μια ιστορική τρύπα στον τοίχο που θα κλείσει τέλεια το ταξίδι σας!'"

          {

            "name": "Bolt / Uber προς Αεροδρόμιο",
            "distance": "Αναχώρηση από Mosta",
            "tip": "Η πτήση της επιστροφής είναι στις 08:05.",
            "cost": "~€18.00",
            "description": "📖 Πρακτική Ανάλυση:\nΟι τιμές για μετακινήσεις με ταξί όπως η Bolt από το αεροδρόμιο προς κεντρικές περιοχές κυμαίνονται μεταξύ €15 και €20.\n\n🎙️ Tip Δούση:\n'Φίλοι μου, δεν ρισκάρουμε να χάσουμε την πτήση με το λεωφορείο X3 τα χαράματα! Κλείστε ένα Bolt από το προηγούμενο βράδυ, μπείτε στο αμάξι και φτάστε στο αεροδρόμιο κύριοι. Καλό και ασφαλές ταξίδι!'"

        let currentDisplayData = [];
        let currentDay = 0;
        let currentCat = 'all';
        let currentTextToSpeak = "";
        const synth = window.speechSynthesis;

        const removeAccents = (str) => {
            return str.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
        };

        render();

        function filterData(type, value) {
            if (type === 'day') {
                currentDay = value;
                document.querySelectorAll('.date-btn').forEach(b => b.classList.remove('active'));
            } else {
                currentCat = value;
                document.querySelectorAll('.btn-filter:not(.date-btn)').forEach(b => b.classList.remove('active'));
            }
            event.target.classList.add('active');
            render();
        }

        function render() {
            const container = document.getElementById('content');
            container.innerHTML = '';

            currentDisplayData = allData.filter(item => {
                const dayMatch = currentDay === 0 || (item.days && item.days.includes(currentDay));
                let catMatch = true;
                
                if (currentCat !== 'all') {
                    const itemCatClean = removeAccents(item.category);
                    const searchCatClean = removeAccents(currentCat);
                    catMatch = itemCatClean.includes(searchCatClean);
                }
                
                return dayMatch && catMatch;
            });

            if (currentDisplayData.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding:20px; color:#777;">Κενό Πρόγραμμα! Ώρα για χαλάρωση! 🍹</div>';
                return;
            }

            currentDisplayData.forEach((item, index) => {
                const distanceHtml = item.distance ? `<span class="distance-tag">👣 Από Βάση/Προηγούμενο: <b>${item.distance}</b></span>` : '';
                const searchQuery = encodeURIComponent(item.name + " Malta");
                const realMapUrl = `https://www.google.com/maps/search/?api=1&query=Dal+Moro's+Fresh+Pasta+to+Go+Venice3{searchQuery}`;

                container.innerHTML += `
                    <div class="card">
                        <div class="category-tag">${item.category}</div>
                        <div class="name">${item.name}</div>
                        ${distanceHtml}
                        <div class="meta-info">
                            <span class="time-badge">🕒 ${item.time || '-'}</span>
                            <span class="cost-badge">💰 ${item.cost}</span>
                        </div>
                        <div class="tip">💡 ${item.tip}</div>
                        <div class="card-actions">
                            <button class="action-btn info-btn" onclick="openModal(${index})">ℹ️ Πλήρης Ανάλυση</button>
                            <a href="${realMapUrl}" target="_blank" class="action-btn map-btn">📍 Χάρτης</a>
                        </div>
                    </div>
                `;
            });
        }

        function openModal(index) {
            const item = currentDisplayData[index];
            if (!item) return;
            document.getElementById('modalTitle').innerText = item.name;
            document.getElementById('modalBody').innerText = item.description || item.tip;
            
            // Αφαίρεση παραπομπών (cite:) και emojis για πιο καθαρή φωνητική ανάγνωση
            let cleanText = (item.description || item.tip).replace(/\]+\]/g, '');
            currentTextToSpeak = cleanText.replace(/([\u2700-\u27BF]|[\uE000-\uF8FF]|\uD83C[\uDC00-\uDFFF]|\uD83D[\uDC00-\uDFFF]|[\u2011-\u26FF]|\uD83E[\uDD10-\uDDFF])/g, '');
            
            document.getElementById('infoModal').style.display = 'flex';
            stopSpeaking();
        }

        function closeModal() {
            document.getElementById('infoModal').style.display = 'none';
            stopSpeaking();
        }

        function startSpeaking() {
            if (synth.speaking) return;
            if (currentTextToSpeak) {
                const utterThis = new SpeechSynthesisUtterance(currentTextToSpeak);
                utterThis.lang = 'el-GR';
                utterThis.rate = 0.95;
                utterThis.onend = () => toggleAudioButtons(false);
                synth.speak(utterThis);
                toggleAudioButtons(true);
            }
        }

        function stopSpeaking() {
            if (synth.speaking) synth.cancel();
            toggleAudioButtons(false);
        }

        function toggleAudioButtons(isSpeaking) {
            document.getElementById('speakBtn').style.display = isSpeaking ? 'none' : 'block';
            document.getElementById('stopBtn').style.display = isSpeaking ? 'block' : 'none';
        }
    </script>
</body>
